<html lang="en" class="dark">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

         GitHub avatars/CDN images that release assets may reference. -->

      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
